trigger:
  branches:
    include:
      - '*'
  paths:
    include:
      - 'src/*'

pool: DEFRA-COMMON-ubuntu2004-SSV3

variables:
  - name: solutionFolder
    value: src
  - name: componentTestProjectFolder
    value: FrontendSchemeRegistration.UI.Component.UnitTests
  - name: dotnetVersion
    value: '8.0.x'

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET SDK'
    inputs:
      packageType: sdk
      version: $(dotnetVersion)

  - task: DotNetCoreCLI@2
    displayName: 'Restore solution'
    inputs:
      command: restore
      projects: '$(solutionFolder)/**/*.csproj'

  - task: DotNetCoreCLI@2
    displayName: 'Build solution'
    inputs:
      command: build
      projects: '$(solutionFolder)/**/*.csproj'
      arguments: '--configuration Release --no-restore'

  - task: DotNetCoreCLI@2
    displayName: 'Run WireMock component tests'
    inputs:
      command: test
      projects: '$(solutionFolder)/$(componentTestProjectFolder)/*.csproj'
      arguments: '--configuration Release --no-build --filter "Category=WireMockServer" --logger "trx;LogFileName=component-tests.trx" --results-directory $(Build.ArtifactStagingDirectory)/test-results'

  - task: PublishTestResults@2
    displayName: 'Publish component test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results/**/*.trx'
      testRunTitle: 'WireMock Component Tests'
